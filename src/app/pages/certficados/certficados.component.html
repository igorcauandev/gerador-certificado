<div class="d-flex align-items-center flex-column">
  <div class="text-center content-titles mb-5">
    <h1 class="fw-bold mb-2 custom-title">Certificados Gerados</h1>
    <p class="mb-4 custom-p">Vizualize todos os Certificados Gerados</p>
  </div>

  @if (certificadosList.length == 0) {
    <div class="custom-card d-flex align-items-center flex-column w-100">
      <i class="ph ph-certificate"></i>
      <div class="custom-waring-titles">
        <h3 class="fw-bold">Nenhum certificado gerado</h3>
        <p class="custom-p">Gere certificados para consultar o histórico</p>
      </div>
      <app-secundary-button routerLink="/certificado/novo" textButton="Gerar Certificado"></app-secundary-button>
    </div>
  }

  @if (certificadosList.length > 0) {
    <div class="list-certificates w-100">
      @for (certificado of certificadosList; track $index) {
        <app-item-certificado
          [nomeAluno]="certificado.nome"
          [dataEmissao]="certificado.dataEmissao"
          [id]="certificado.id"
        ></app-item-certificado>
      }
    </div>
  }
  

</div>
